<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spurwise Dialer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }

    label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }

    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 16px; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }

    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, background 0.15s; margin-top: 12px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-call    { background: #16a34a; color: white; }
    .btn-call:hover:not(:disabled) { background: #15803d; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }

    .status-bar {
      margin-top: 14px; padding: 10px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 500; background: #f1f5f9; color: #475569;
      min-height: 38px; display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #94a3b8; }
    .dot.green  { background: #16a34a; }
    .dot.red    { background: #dc2626; }
    .dot.yellow { background: #ca8a04; animation: pulse 1s infinite; }
    .dot.blue   { background: #2563eb; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }

    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .log-title  { font-size: 13px; font-weight: 600; color: #444; }
    .btn-copy   { font-size: 12px; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; color: #555; }
    .btn-copy:hover { background: #f9fafb; }

    table { width: 100%; font-size: 12px; border-collapse: collapse; }
    th { text-align: left; color: #888; font-weight: 500; padding: 4px 6px; border-bottom: 1px solid #e5e7eb; }
    td { padding: 6px 6px; border-bottom: 1px solid #f3f4f6; color: #333; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge-answered  { background: #dcfce7; color: #15803d; }
    .badge-noanswer  { background: #fef9c3; color: #854d0e; }
    .badge-busy      { background: #fee2e2; color: #991b1b; }
    .badge-failed    { background: #f3f4f6; color: #6b7280; }
    .badge-calling   { background: #dbeafe; color: #1d4ed8; }

    .empty-log { font-size: 12px; color: #aaa; text-align: center; padding: 12px 0; }
    .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; }

    #login-screen  { display: block; }
    #dialer-screen { display: none; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="login-screen">
  <h1>Spurwise Dialer</h1>
  <p class="subtitle">Enter your password to continue</p>
  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">
  <button class="btn btn-primary" id="login-btn" onclick="login()">Sign in</button>
  <p class="error-msg" id="login-error"></p>
</div>

<!-- DIALER -->
<div class="card" id="dialer-screen">
  <h1>Spurwise Dialer</h1>
  <p class="subtitle">Calls from UK number — outcome detected automatically</p>

  <label for="number">UK number to call</label>
  <input type="text" id="number" placeholder="+44 7700 900000" value="+44 ">

  <button class="btn btn-call" id="call-btn" onclick="makeCall()" disabled>Call</button>

  <div class="status-bar">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Sign in to start</span>
  </div>

  <hr class="divider">

  <div class="log-header">
    <span class="log-title">Call log</span>
    <button class="btn-copy" onclick="copyLog()">Copy CSV</button>
  </div>

  <table>
    <thead>
      <tr><th>Time (UK)</th><th>Number</th><th>Outcome</th><th>Notes</th></tr>
    </thead>
    <tbody id="log-body">
      <tr><td colspan="4" class="empty-log">No calls yet</td></tr>
    </tbody>
  </table>
</div>

<script>
  let storedPassword = '';
  let polling = null;
  let logRows = JSON.parse(localStorage.getItem('dialerLog') || '[]');

  // ── Login ──────────────────────────────────────────────
  document.getElementById('pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pw = document.getElementById('pw').value.trim();
    if (!pw) return;

    document.getElementById('login-btn').disabled = true;
    document.getElementById('login-error').textContent = '';

    // Validate password by attempting a dummy call check
    // We verify by hitting /poll with a fake SID — a 401 means wrong password
    // Instead, we just store it and verify on first real call. Show dialer immediately.
    storedPassword = pw;
    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('dialer-screen').style.display = 'block';
    document.getElementById('call-btn').disabled = false;
    setStatus('Ready', '');
    renderLog();
  }

  // ── Make Call ──────────────────────────────────────────
  async function makeCall() {
    const raw = document.getElementById('number').value.trim();
    const to  = raw.replace(/\s+/g, '');

    if (!to.startsWith('+')) {
      setStatus('Enter number in +44 format', 'red');
      return;
    }

    document.getElementById('call-btn').disabled = true;
    setStatus('Initiating call…', 'blue');

    const now = new Date().toLocaleString('en-GB', { timeZone: 'Europe/London' });

    try {
      const res = await fetch('/call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: storedPassword, to }),
      });

      const data = await res.json();

      if (!res.ok) {
        if (res.status === 401) {
          setStatus('Wrong password — reload and try again', 'red');
        } else {
          setStatus('Error: ' + (data.error || 'Unknown'), 'red');
          document.getElementById('call-btn').disabled = false;
        }
        return;
      }

      setStatus('Ringing…', 'yellow');
      addLogRow(now, to, data.callSid, 'calling');
      startPolling(data.callSid);

    } catch (err) {
      setStatus('Network error — try again', 'red');
      document.getElementById('call-btn').disabled = false;
    }
  }

  // ── Poll for call status ───────────────────────────────
  function startPolling(callSid) {
    if (polling) clearInterval(polling);
    polling = setInterval(async () => {
      try {
        const res  = await fetch(`/poll?callSid=${callSid}`);
        const data = await res.json();

        updateLogOutcome(callSid, data.status);

        if (data.terminal) {
          clearInterval(polling);
          polling = null;

          const label = outcomeLabel(data.status);
          setStatus(`Done — ${label}`, data.status === 'completed' ? 'green' : '');
          document.getElementById('call-btn').disabled = false;
        } else {
          const label = data.status === 'ringing' ? 'Ringing…' : 'Connecting…';
          setStatus(label, 'yellow');
        }
      } catch {
        // ignore transient network errors during polling
      }
    }, 2000);
  }

  // ── Status bar ─────────────────────────────────────────
  function setStatus(text, colour) {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('status-dot');
    dot.className = 'dot' + (colour ? ' ' + colour : '');
  }

  // ── Call log ───────────────────────────────────────────
  function addLogRow(time, number, callSid, status) {
    logRows.unshift({ time, number, callSid, status, notes: '' });
    saveLog();
    renderLog();
  }

  function updateLogOutcome(callSid, status) {
    const row = logRows.find(r => r.callSid === callSid);
    if (row) { row.status = status; saveLog(); renderLog(); }
  }

  function saveLog() {
    localStorage.setItem('dialerLog', JSON.stringify(logRows));
  }

  function outcomeLabel(status) {
    return {
      completed: 'Answered',
      'no-answer': 'No Answer',
      busy:     'Busy',
      failed:   'Failed',
      canceled: 'Canceled',
      calling:  'Calling…',
      ringing:  'Ringing…',
      queued:   'Queued',
      'in-progress': 'In Progress',
    }[status] || status;
  }

  function badgeClass(status) {
    if (status === 'completed')               return 'badge-answered';
    if (status === 'no-answer')               return 'badge-noanswer';
    if (status === 'busy')                    return 'badge-busy';
    if (['calling','ringing','queued','in-progress'].includes(status)) return 'badge-calling';
    return 'badge-failed';
  }

  function renderLog() {
    const tbody = document.getElementById('log-body');
    if (!logRows.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty-log">No calls yet</td></tr>';
      return;
    }
    tbody.innerHTML = logRows.map((r, i) => `
      <tr>
        <td>${r.time}</td>
        <td>${r.number}</td>
        <td><span class="badge ${badgeClass(r.status)}">${outcomeLabel(r.status)}</span></td>
        <td><input type="text" style="width:100%;font-size:12px;border:1px solid #eee;border-radius:4px;padding:2px 4px;"
             value="${r.notes}" placeholder="Notes"
             onchange="logRows[${i}].notes=this.value;saveLog()"></td>
      </tr>
    `).join('');
  }

  function copyLog() {
    const header = 'Time (UK),Number,Outcome,Notes';
    const rows   = logRows.map(r =>
      `"${r.time}","${r.number}","${outcomeLabel(r.status)}","${r.notes}"`
    );
    navigator.clipboard.writeText([header, ...rows].join('\n')).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy CSV', 1500);
    });
  }
</script>
</body>
</html>
